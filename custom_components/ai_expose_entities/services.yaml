# yaml-language-server: $schema=../../schemas/yaml/services_schema.yaml
# Service actions for ai_expose_entities

run_recommendation:
  name: Run Recommendations
  description: Run the AI model to recommend entities for Assist exposure.

apply_decisions:
  name: Apply Decisions
  description: Apply approval or denial decisions for recommended entities.
  fields:
    approved_entity_ids:
      name: Approved entities
      description: Entities to expose to Assist.
      required: false
      selector:
        entity:
          multiple: true
    denied_entity_ids:
      name: Denied entities
      description: Entities to block from Assist exposure.
      required: false
      selector:
        entity:
          multiple: true
